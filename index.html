<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OVO Live Ops Dashboard</title>
    <style>
        :root { --dark: #004a32; --green: #2ecc71; --amber: #f1c40f; --red: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        header { background: white; padding: 15px; border-bottom: 4px solid var(--dark); display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px; }
        .container { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .summary-box { background: var(--dark); color: white; padding: 20px; border-radius: 10px; min-height: 200px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; border-top: 5px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card.green { border-top-color: var(--green); }
        .card.amber { border-top-color: var(--amber); }
        .card.red { border-top-color: var(--red); }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th { background: #fafafa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header><div>OVO LIVE OPERATIONS</div><div id="time">Connecting...</div></header>
    <div class="container">
        <div class="summary-box"><h3>EXECUTIVE SUMMARY</h3><p id="sum">Loading from Google Doc...</p></div>
        <div>
            <div class="kpi-grid" id="kpis"></div>
            <table>
                <thead><tr><th>Area</th><th>vsFcst</th><th>ASA</th><th>Abnd%</th><th>AHT</th><th>Adh</th></tr></thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>
    <script>
        // REPLACE THE LINK BELOW WITH YOUR APPS SCRIPT WEB APP URL (The one ending in /exec)
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyC1fG1-A8UqX8B_1A8rM6U_qYp7-wFYdPJf1EqiyFk-/exec';

        async function updateDashboard() {
            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                
                // Update Summary
                document.getElementById('sum').innerText = data.summary || "No summary found.";

                // Update KPI Tiles
                document.getElementById('kpis').innerHTML = data.metrics.map(m => `
                    <div class="card ${m.rag}">
                        <div style="font-size:11px;color:#666">${m.area}</div>
                        <div style="font-size:22px;font-weight:bold">${m.asa}</div>
                    </div>
                `).join('');

                // Update Table Rows
                document.getElementById('rows').innerHTML = data.metrics.map(m => `
                    <tr>
                        <td><strong>${m.area}</strong></td>
                        <td>${m.vsFcst}</td>
                        <td style="color:var(--${m.rag});font-weight:bold">${m.asa}</td>
                        <td>${m.abnd}</td>
                        <td>${m.aht}</td>
                        <td>${m.adh}</td>
                    </tr>
                `).join('');

                document.getElementById('time').innerText = "Last Updated: " + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('sum').innerText = "Error: Could not connect to Google Script. Check permissions.";
                console.error(error);
            }
        }

        updateDashboard();
        setInterval(updateDashboard, 60000);
    </script>
</body>
</html>
